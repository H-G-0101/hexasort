<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Eliminating Stacking - TESTE LOCAL (estudo)</title>
<link rel="stylesheet" href="style-mobile.f06f5.css" />
<style>
  html,body{margin:0;height:100%;background:#222;overflow:hidden}
  #GameCanvas{display:block;width:100%;height:100%}
  #splash{position:absolute;inset:0;display:none;background:#111}
  #splash .progress-bar{position:absolute;left:25%;top:50%;width:50%;height:8px;background:#333;border-radius:4px}
  #splash .progress-bar span{display:block;height:100%;width:0%;background:#6cf;border-radius:4px;transition:width .2s}
  #note{position:fixed;left:8px;bottom:8px;z-index:9999;font:12px/1.4 monospace;color:#9f9;background:#0008;padding:6px 8px;border-radius:6px;max-width:360px}
</style>
</head>
<body style="overflow-x:hidden;overflow-y:hidden;">
<canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
<div id="splash"><div class="progress-bar stripes"><span style="width:0%"></span></div></div>
<div id="note">Build de ESTUDO local - SDK Yandex em stub. F12 p/ inspecionar. Alguns assets podem dar 404 (ver _FALTANDO.txt).</div>

<script src="sdk.js?v=2"></script>
<script src="modal-bridge.js?v=31"></script>
<script src="src/settings.acf60.js" charset="utf-8"></script>
<script src="main.73069.js" charset="utf-8"></script>
<script type="text/javascript">
(function () {
  var splash = document.getElementById('splash'); splash.style.display='block';
  function loadScript(src,cb){var s=document.createElement('script');s.async=true;s.src=src;
    s.addEventListener('load',function(){cb&&cb();});
    s.addEventListener('error',function(){console.error('Falha ao carregar',src);});
    document.body.appendChild(s);}
  var ready=0,started=false;
  function tryStart(msg){ready++;if(started||ready<2)return;started=true;console.log('[boot]',msg);
    loadScript('cocos2d-js-min.72f3f.js',function(){
      if(typeof window.boot==='function')window.boot();
      else console.error('window.boot indefinido (main.73069.js)');});}
  try{
    YaGames.init().then(function(ysdk){window.ysdk=ysdk;
      ysdk.getStorage().then(function(st){
        Object.defineProperty(window,'localStorage',{configurable:true,get:function(){return st;}});
        tryStart('storage ok');}).catch(function(){tryStart('storage err');});
      ysdk.getPlayer().then(function(p){window.yPlayer=p;tryStart('player ok');})
                      .catch(function(){tryStart('player err');});
    }).catch(function(){tryStart('init err');tryStart('init err');});
  }catch(e){tryStart('exc');tryStart('exc');}
})();
</script>
</body>
</html>
